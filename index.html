<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM MALFUNCTION</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #00ff00;
        }

        /* İlk Açılış Ekranı Düzeni (Logo ve Yazı) */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            transition: opacity 0.5s ease-in-out;
        }

        /* Saf kodla çizilen logo koordinatları ve parlama efekti */
        .devil-logo {
            width: 320px;
            height: 320px;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.98);
                filter: drop-shadow(0 0 10px #ff0000);
            }
            100% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 25px #ff3333);
            }
        }

        .terminal-text {
            margin-top: 20px;
            font-size: 14pt;
            text-shadow: 0 0 5px #00ff00;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Sürekli Akan Yeşil Kod Yağmuru Arka Planı */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        /* 3 Saniye Sonra Devreye Giren Erişim Onay Katmanı */
        .access-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent; /* Arka plan siyah kalır, arkadaki kod yağmuru görünür */
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .access-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Ortadaki Siber Yeşil Terminal Kutusu */
        .access-box {
            border: 2px solid #00ff00;
            background-color: rgba(0, 15, 0, 0.9); /* Yarı şeffaf siyah/koyu yeşil siber kutu */
            padding: 30px 50px;
            color: #00ff00;
            font-size: 24pt;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ff00;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
            text-align: center;
            animation: pulseBox 1.5s infinite alternate;
        }

        @keyframes pulseBox {
            0% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
            100% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.6); }
        }
    </style>
</head>
<body>

    <canvas class="matrix-bg" id="matrix"></canvas>

    <div class="container" id="mainContainer">
        <svg class="devil-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 42 35 C 38 20, 42 10, 44 5 C 32 10, 36 28, 38 36" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 58 35 C 62 20, 58 10, 56 5 C 68 10, 64 28, 62 36" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 38 36 C 42 32, 58 32, 62 36" fill="none" stroke="#ffffff" stroke-width="2"/>
            <path d="M 38 36 C 34 45, 38 60, 50 75 C 62 60, 66 45, 62 36" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 36 40 C 28 36, 26 42, 32 48" fill="none" stroke="#ffffff" stroke-width="1.5"/>
            <path d="M 34 43 C 29 40, 30 43, 33 46" fill="none" stroke="#ffffff" stroke-width="1"/>
            <path d="M 64 40 C 72 36, 74 42, 68 48" fill="none" stroke="#ffffff" stroke-width="1.5"/>
            <path d="M 66 43 C 71 40, 70 43, 67 46" fill="none" stroke="#ffffff" stroke-width="1"/>
            <path d="M 40 46 L 48 49 L 45 52 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
            <path d="M 60 46 L 52 49 L 55 52 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
            <path d="M 49 49 L 50 56 L 51 49" fill="none" stroke="#ffffff" stroke-width="1.5"/>
            <path d="M 42 58 C 45 66, 55 66, 58 58 C 54 62, 46 62, 42 58 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
            <path d="M 43 59 L 45 61 L 47 59 L 49 62 L 51 59 L 53 62 L 55 59 L 57 60" fill="none" stroke="#000000" stroke-width="0.8"/>
        </svg>
        <div class="terminal-text">SISTEM ELE GECIRILDI...</div>
    </div>

    <div class="access-screen" id="accessScreen">
        <div class="access-box">
            ERISIM ONAYLANDI
        </div>
    </div>

    <script>
        // Matrix Canvas Kodları
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const nums = "0123456789XÆØ★☣☠";
        const alphabet = nums.split("");

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Zamanlayıcı: 3 Saniye Sonra Logoyu Gizler, Onay Kutusunu Getirir
        setTimeout(() => {
            document.getElementById('mainContainer').style.opacity = '0';
            document.getElementById('accessScreen').classList.add('active');
        }, 3000);
    </script>
</body>
</html>
