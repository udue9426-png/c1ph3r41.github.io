<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>C1ph3r Command Panel</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; }
        /* Masaüstü arka planı */
        #desktop { width: 100vw; height: 100vh; background: radial-gradient(circle, #001100 0%, #000 100%); }
        
        /* Sürüklenebilir Pencereler */
        .window { 
            position: absolute; width: 250px; background: #050505; border: 1px solid #00ff00; 
            cursor: move; box-shadow: 0 0 10px #00ff00;
        }
        .window-header { background: #002200; padding: 5px; font-size: 12px; border-bottom: 1px solid #00ff00; text-align: center; }
        .window-content { padding: 10px; font-size: 11px; }

        /* Görev Çubuğu */
        .taskbar { position: fixed; bottom: 0; width: 100%; height: 35px; background: #00ff00; color: #000; display: flex; align-items: center; padding: 0 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Örnek bir pencere -->
    <div class="window" id="win1" style="top: 50px; left: 50px;">
        <div class="window-header">SİSTEM KONSOLU</div>
        <div class="window-content">
            > RAM: 8GB<br>
            > IP: 192.168.1.1<br>
            > STATUS: ACTIVE
        </div>
    </div>
</div>

<div class="taskbar">C1PH3R COMMAND PANEL v1.0</div>

<script>
    // Sürükleme Mantığı
    let activeWindow = null;
    document.addEventListener('mousedown', (e) => {
        if(e.target.closest('.window')) {
            activeWindow = e.target.closest('.window');
        }
    });
    document.addEventListener('mousemove', (e) => {
        if(activeWindow) {
            activeWindow.style.left = e.clientX - 50 + 'px';
            activeWindow.style.top = e.clientY - 10 + 'px';
        }
    });
    document.addEventListener('mouseup', () => activeWindow = null);
</script>

</body>
</html>
