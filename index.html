<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <style>
        /* Tüm sayfayı simsiyah yapar ve kaydırma çubuklarını gizler */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Logoyu tam ortalar ve boyutunu ayarlar */
        .logo-container {
            max-width: 80%;
            max-height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            max-width: 400px; /* Logonun ekranda çok büyük olmaması için sınır */
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- src kısmına logonun tam adını ve uzantısını yazmalısın -->
        <img src="1000007275.png" alt="Logo">
    </div>

</body>
</html>
