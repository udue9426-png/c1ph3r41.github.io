<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>C1ph3r Hack</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
        }

        body {
            height: 100vh;
            background: url("bg.jpg") no-repeat center center/cover;
            color: #00ff66;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
        }

        .welcome {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            animation: fadeOut 3s ease forwards;
            animation-delay: 2s;
            z-index: 2;
        }

        .welcome h1 {
            font-size: 48px;
            text-shadow: 0 0 20px #00ff66;
        }

        .welcome p {
            font-size: 22px;
            margin-top: 10px;
        }

        .panel {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: showPanel 1s ease forwards;
            animation-delay: 5s;
            z-index: 2;
        }

        .file {
            padding: 15px 25px;
            border: 1px solid #00ff66;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }

        .file:hover {
            background: #00ff66;
            color: black;
            box-shadow: 0 0 20px #00ff66;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes showPanel {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="welcome">
    <h1>C1ph3r Hack</h1>
    <p>Hoşgeldiniz</p>
</div>

<div class="panel">
    <div class="file" onclick="animateFile(this)">📁 System</div>
    <div class="file" onclick="animateFile(this)">📁 Network</div>
    <div class="file" onclick="animateFile(this)">📁 Logs</div>
    <div class="file" onclick="animateFile(this)">📁 Access</div>
</div>

<script>
    function animateFile(el) {
        el.style.transform = "scale(1.2)";
        el.style.boxShadow = "0 0 30px #00ff66";

        setTimeout(() => {
            el.style.transform = "scale(1)";
            el.style.boxShadow = "none";
            alert(el.innerText + " açıldı");
        }, 400);
    }
</script>

</body>
</html>
